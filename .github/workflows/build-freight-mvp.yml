name: Build Freight MVP APK

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-freight-mvp.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android MVP project
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p FreightMVP/app/src/main/java/com/example/freightmvp
          cat > FreightMVP/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'FreightMVP'
          include ':app'
          EOF
          cat > FreightMVP/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF
          cat > FreightMVP/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.example.freightmvp'
              compileSdk 35
              defaultConfig {
                  applicationId 'com.example.freightmvp'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0.0'
              }
          }
          EOF
          cat > FreightMVP/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:theme="@style/AppTheme" android:label="货运MVP" android:allowBackup="true" android:resizeableActivity="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          mkdir -p FreightMVP/app/src/main/res/values
          cat > FreightMVP/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#1565C0</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#0D47A1</item>
              </style>
          </resources>
          EOF
          cat > FreightMVP/app/src/main/java/com/example/freightmvp/MainActivity.java <<'EOF'
          package com.example.freightmvp;

          import android.app.*;import android.os.*;import android.graphics.Color;import android.graphics.Typeface;import android.view.*;import android.view.inputmethod.InputMethodManager;import android.content.*;import android.widget.*;import java.util.*;

          public class MainActivity extends Activity{
            LinearLayout root,content,tabs; ArrayList<Cargo> cargos=new ArrayList<>(); ArrayList<Order> orders=new ArrayList<>(); int blue=Color.rgb(21,101,192);
            static class Cargo{String from,to,goods,weight,price,vehicle,phone,note; Cargo(String f,String t,String g,String w,String p,String v,String ph,String n){from=f;to=t;goods=g;weight=w;price=p;vehicle=v;phone=ph;note=n;}}
            static class Order{Cargo c;String status;Order(Cargo c,String s){this.c=c;status=s;}}
            public void onCreate(Bundle b){super.onCreate(b);seed();build();showHome();}
            void seed(){cargos.add(new Cargo("上海","杭州","电子配件","8吨","¥2600","9.6米厢式","13800000001","今日装货，到付可议"));cargos.add(new Cargo("深圳","广州","生鲜冷链","5吨","¥1800","冷藏车","13800000002","温控 2-8℃"));cargos.add(new Cargo("苏州","成都","家具整车","18吨","¥8600","13米高栏","13800000003","需绑带雨布"));orders.add(new Order(cargos.get(1),"运输中"));}
            TextView tv(String s,int sp,int c,int style){TextView v=new TextView(this);v.setText(s);v.setTextSize(sp);v.setTextColor(c);v.setTypeface(Typeface.DEFAULT,style);v.setPadding(24,14,24,14);return v;}
            void build(){root=new LinearLayout(this);root.setOrientation(LinearLayout.VERTICAL);setContentView(root);TextView title=tv("货运平台 MVP",22,Color.WHITE,Typeface.BOLD);title.setBackgroundColor(blue);root.addView(title,new LinearLayout.LayoutParams(-1,-2));content=new LinearLayout(this);content.setOrientation(LinearLayout.VERTICAL);ScrollView sv=new ScrollView(this);sv.addView(content);root.addView(sv,new LinearLayout.LayoutParams(-1,0,1));tabs=new LinearLayout(this);tabs.setOrientation(LinearLayout.HORIZONTAL);root.addView(tabs,new LinearLayout.LayoutParams(-1,-2));tab("货源",v->showHome());tab("发布",v->showPost());tab("订单",v->showOrders());tab("我的",v->showMe());}
            void tab(String s,View.OnClickListener l){TextView t=tv(s,16,blue,Typeface.BOLD);t.setGravity(Gravity.CENTER);t.setOnClickListener(l);tabs.addView(t,new LinearLayout.LayoutParams(0,-2,1));}
            void clear(){content.removeAllViews();}
            void showHome(){clear();content.addView(tv("货源大厅",20,Color.DKGRAY,Typeface.BOLD));for(Cargo c:cargos)card(c);}
            void card(Cargo c){LinearLayout box=new LinearLayout(this);box.setOrientation(LinearLayout.VERTICAL);box.setPadding(18,18,18,18);box.setBackgroundColor(Color.rgb(245,248,252));TextView route=tv(c.from+" → "+c.to,18,blue,Typeface.BOLD);box.addView(route);box.addView(tv(c.goods+"｜"+c.weight+"｜"+c.vehicle,15,Color.DKGRAY,Typeface.NORMAL));box.addView(tv(c.price+"｜联系人 "+c.phone,15,Color.rgb(230,81,0),Typeface.BOLD));Button b=new Button(this);b.setText("查看并接单");b.setOnClickListener(v->detail(c));box.addView(b);LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(-1,-2);lp.setMargins(20,12,20,12);content.addView(box,lp);}
            void detail(Cargo c){clear();content.addView(tv(c.from+" → "+c.to,22,blue,Typeface.BOLD));content.addView(tv("货物："+c.goods,16,Color.DKGRAY,0));content.addView(tv("重量："+c.weight,16,Color.DKGRAY,0));content.addView(tv("车型："+c.vehicle,16,Color.DKGRAY,0));content.addView(tv("报价："+c.price,16,Color.rgb(230,81,0),Typeface.BOLD));content.addView(tv("联系人："+c.phone,16,Color.DKGRAY,0));content.addView(tv("备注："+c.note,16,Color.DKGRAY,0));Button take=new Button(this);take.setText("确认接单");take.setOnClickListener(v->{orders.add(new Order(c,"待装货"));Toast.makeText(this,"接单成功，已加入我的订单",Toast.LENGTH_LONG).show();showOrders();});content.addView(take);Button back=new Button(this);back.setText("返回货源大厅");back.setOnClickListener(v->showHome());content.addView(back);}
            EditText input(String hint){EditText e=new EditText(this);e.setHint(hint);e.setPadding(24,8,24,8);content.addView(e,new LinearLayout.LayoutParams(-1,-2));return e;}
            void showPost(){clear();content.addView(tv("发布货源",20,Color.DKGRAY,Typeface.BOLD));EditText f=input("出发地，如 上海");EditText t=input("目的地，如 杭州");EditText g=input("货物名称");EditText w=input("重量，如 10吨");EditText p=input("报价，如 ¥3000");EditText v=input("车型，如 9.6米厢式");Button post=new Button(this);post.setText("发布到货源大厅");post.setOnClickListener(x->{Cargo c=new Cargo(f.getText().toString(),t.getText().toString(),g.getText().toString(),w.getText().toString(),p.getText().toString(),v.getText().toString(),"本机模拟","本地模拟数据，无需服务器");cargos.add(0,c);Toast.makeText(this,"发布成功",Toast.LENGTH_SHORT).show();showHome();});content.addView(post);}
            void showOrders(){clear();content.addView(tv("我的订单",20,Color.DKGRAY,Typeface.BOLD));if(orders.isEmpty())content.addView(tv("暂无订单",16,Color.GRAY,0));for(Order o:orders){content.addView(tv(o.status+"｜"+o.c.from+" → "+o.c.to+"｜"+o.c.price,16,blue,Typeface.BOLD));content.addView(tv(o.c.goods+"｜"+o.c.weight+"｜"+o.c.vehicle,14,Color.DKGRAY,0));}}
            void showMe(){clear();content.addView(tv("我的",20,Color.DKGRAY,Typeface.BOLD));content.addView(tv("司机：张师傅（已认证）",16,Color.DKGRAY,0));content.addView(tv("车辆：粤B·MVP88｜9.6米厢式",16,Color.DKGRAY,0));content.addView(tv("钱包余额：¥12,860",16,Color.rgb(230,81,0),Typeface.BOLD));content.addView(tv("说明：本版本为离线 MVP，后端数据均在本地内存模拟。",15,Color.GRAY,0));}
          }
          EOF

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build debug APK
        working-directory: FreightMVP
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreightMVP-debug-apk
          path: FreightMVP/app/build/outputs/apk/debug/*.apk
