name: Build Bubyun Driver APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/build-freight-mvp.yml'
      - 'FreightMVP_BUILD_NOTE.md'
  push:
    paths:
      - '.github/workflows/build-freight-mvp.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Bubyun Driver Android app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p FreightMVP/app/src/main/java/com/bubuyun/driver
          mkdir -p FreightMVP/app/src/main/res/values
          mkdir -p FreightMVP/app/src/main/res/drawable

          cat > FreightMVP/settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'BubyunDriver'
          include ':app'
          EOF

          cat > FreightMVP/build.gradle <<'EOF'
          plugins { id 'com.android.application' version '8.5.2' apply false }
          EOF

          cat > FreightMVP/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.bubuyun.driver'
              compileSdk 35
              defaultConfig { applicationId 'com.bubuyun.driver'; minSdk 23; targetSdk 35; versionCode 2; versionName '1.0.1' }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          EOF

          cat > FreightMVP/app/src/main/res/values/strings.xml <<'EOF'
          <resources><string name="app_name">步步云司机</string></resources>
          EOF

          cat > FreightMVP/app/src/main/res/values/styles.xml <<'EOF'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"><item name="android:fontFamily">sans</item><item name="android:windowLightStatusBar">false</item><item name="android:statusBarColor">#0B57D0</item><item name="android:navigationBarColor">#FFFFFF</item><item name="android:colorAccent">#0B57D0</item></style></resources>
          EOF

          cat > FreightMVP/app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#0B57D0" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M30,52c0,-9 7,-16 16,-16c4,0 8,1 11,4c3,-9 11,-15 21,-15c13,0 24,11 24,24c0,2 0,3 -1,5h-71z"/>
              <path android:fillColor="#DCEBFF" android:pathData="M47,65h14l11,34h-36z"/>
              <path android:fillColor="#0B57D0" android:pathData="M53,69h3l2,26h-7z"/>
          </vector>
          EOF

          cat > FreightMVP/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/AppTheme" android:label="@string/app_name" android:icon="@drawable/ic_launcher" android:roundIcon="@drawable/ic_launcher" android:allowBackup="true" android:resizeableActivity="true"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>
          EOF

          cat > FreightMVP/app/src/main/java/com/bubuyun/driver/MainActivity.java <<'EOF'
          package com.bubuyun.driver;
          import android.app.Activity;import android.os.Bundle;import android.graphics.Color;import android.graphics.Typeface;import android.graphics.drawable.GradientDrawable;import android.view.Gravity;import android.view.View;import android.widget.*;import java.util.*;
          public class MainActivity extends Activity{LinearLayout root,content,nav;ScrollView scroll;ArrayList<Cargo> cargos=new ArrayList<>();ArrayList<Order> orders=new ArrayList<>();String active="首页";int blue=Color.rgb(11,87,208),deep=Color.rgb(18,32,61),muted=Color.rgb(103,115,135),bg=Color.rgb(246,248,252),orange=Color.rgb(235,108,0);
          static class Cargo{String from,to,goods,weight,price,vehicle,time,tag,contact,note;Cargo(String a,String b,String c,String d,String e,String f,String g,String h,String i,String j){from=a;to=b;goods=c;weight=d;price=e;vehicle=f;time=g;tag=h;contact=i;note=j;}}static class Order{Cargo c;String status;Order(Cargo c,String s){this.c=c;status=s;}}
          public void onCreate(Bundle b){super.onCreate(b);seed();build();showHome();}void seed(){cargos.add(new Cargo("上海","杭州","电子配件","8 吨","¥2600","9.6 米厢式","今天 18:00","急装","李经理","到仓装车，回单结算"));cargos.add(new Cargo("深圳","广州","生鲜冷链","5 吨","¥1800","冷藏车","今天 21:00","冷链","王经理","温控 2-8℃，整车直达"));cargos.add(new Cargo("苏州","成都","家具整车","18 吨","¥8600","13 米高栏","明天 08:30","长途","陈经理","需绑带雨布，装卸协助"));cargos.add(new Cargo("宁波","武汉","日用品","12 吨","¥5200","17.5 米平板","明天 12:00","优选","周经理","可提前进场排队"));orders.add(new Order(cargos.get(1),"运输中"));}
          int dp(int v){return(int)(v*getResources().getDisplayMetrics().density+0.5f);}TextView tv(String s,int sp,int c,int style){TextView v=new TextView(this);v.setText(s);v.setTextSize(sp);v.setTextColor(c);v.setTypeface(Typeface.DEFAULT,style);v.setPadding(dp(14),dp(6),dp(14),dp(6));return v;}GradientDrawable shape(int color,int r){GradientDrawable g=new GradientDrawable();g.setColor(color);g.setCornerRadius(dp(r));return g;}GradientDrawable stroke(int color,int r,int sw,int sc){GradientDrawable g=shape(color,r);g.setStroke(dp(sw),sc);return g;}
          void build(){root=new LinearLayout(this);root.setOrientation(LinearLayout.VERTICAL);root.setBackgroundColor(bg);setContentView(root);content=new LinearLayout(this);content.setOrientation(LinearLayout.VERTICAL);content.setPadding(dp(12),dp(8),dp(12),dp(12));scroll=new ScrollView(this);scroll.addView(content);root.addView(scroll,new LinearLayout.LayoutParams(-1,0,1));nav=new LinearLayout(this);nav.setOrientation(LinearLayout.HORIZONTAL);nav.setPadding(dp(6),dp(4),dp(6),dp(4));nav.setBackgroundColor(Color.WHITE);root.addView(nav,new LinearLayout.LayoutParams(-1,dp(64)));}
          void nav(){nav.removeAllViews();tab("首页",v->showHome());tab("发布",v->showPublish());tab("找货",v->showCargo());tab("我的",v->showMe());}void tab(String s,View.OnClickListener l){TextView t=tv((s.equals(active)?"● ":"")+s,15,s.equals(active)?blue:muted,Typeface.BOLD);t.setGravity(Gravity.CENTER);t.setOnClickListener(l);nav.addView(t,new LinearLayout.LayoutParams(0,-1,1));}void clear(String a){active=a;content.removeAllViews();nav();scroll.scrollTo(0,0);}void header(String title,String sub){TextView h=tv(title,24,deep,Typeface.BOLD);h.setPadding(dp(14),dp(12),dp(14),0);content.addView(h);TextView p=tv(sub,14,muted,0);p.setPadding(dp(14),0,dp(14),dp(8));content.addView(p);}LinearLayout card(){LinearLayout box=new LinearLayout(this);box.setOrientation(LinearLayout.VERTICAL);box.setPadding(dp(14),dp(12),dp(14),dp(12));box.setBackground(stroke(Color.WHITE,18,1,Color.rgb(232,237,247)));LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(-1,-2);lp.setMargins(0,dp(8),0,dp(8));content.addView(box,lp);return box;}Button btn(String s){Button b=new Button(this);b.setText(s);b.setTextColor(Color.WHITE);b.setTextSize(15);b.setAllCaps(false);b.setBackground(shape(blue,14));return b;}
          void showHome(){clear("首页");header("步步云司机","高效接单，安心运输");LinearLayout dash=card();dash.setBackground(shape(blue,20));dash.addView(tv("今日收入",14,Color.rgb(218,232,255),0));dash.addView(tv("¥1,860",30,Color.WHITE,Typeface.BOLD));dash.addView(tv("运输中 1 单｜待装货 0 单｜已完成 12 单",14,Color.WHITE,0));TextView q=tv("常用服务",18,deep,Typeface.BOLD);q.setPadding(dp(14),dp(16),dp(14),dp(6));content.addView(q);LinearLayout row=new LinearLayout(this);row.setOrientation(LinearLayout.HORIZONTAL);content.addView(row,new LinearLayout.LayoutParams(-1,-2));mini(row,"找货大厅","智能匹配路线",v->showCargo());mini(row,"发布车源","提升返程满载",v->showPublish());content.addView(tv("推荐货源",18,deep,Typeface.BOLD));for(int i=0;i<Math.min(2,cargos.size());i++)cargoCard(cargos.get(i));}
          void mini(LinearLayout row,String t,String s,View.OnClickListener l){LinearLayout m=new LinearLayout(this);m.setOrientation(LinearLayout.VERTICAL);m.setPadding(dp(12),dp(12),dp(12),dp(12));m.setBackground(stroke(Color.WHITE,18,1,Color.rgb(232,237,247)));m.setOnClickListener(l);m.addView(tv(t,16,deep,Typeface.BOLD));m.addView(tv(s,13,muted,0));LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(0,dp(92),1);lp.setMargins(dp(4),dp(4),dp(4),dp(12));row.addView(m,lp);}void showCargo(){clear("找货");header("找货大厅","优质货源实时更新");for(Cargo x:cargos)cargoCard(x);}void cargoCard(Cargo x){LinearLayout box=card();LinearLayout top=new LinearLayout(this);top.setGravity(Gravity.CENTER_VERTICAL);TextView route=tv(x.from+" → "+x.to,19,deep,Typeface.BOLD);top.addView(route,new LinearLayout.LayoutParams(0,-2,1));TextView tag=tv(x.tag,12,blue,Typeface.BOLD);tag.setGravity(Gravity.CENTER);tag.setBackground(stroke(Color.rgb(236,243,255),12,1,Color.rgb(210,226,255)));top.addView(tag,new LinearLayout.LayoutParams(dp(58),dp(34)));box.addView(top);box.addView(tv(x.goods+"｜"+x.weight+"｜"+x.vehicle,15,Color.rgb(65,76,94),0));box.addView(tv("装货时间："+x.time,14,muted,0));box.addView(tv(x.price,22,orange,Typeface.BOLD));Button b=btn("查看详情 / 立即接单");b.setOnClickListener(v->detail(x));box.addView(b,new LinearLayout.LayoutParams(-1,dp(46)));}
          void detail(Cargo x){clear("找货");header("货源详情",x.from+" 至 "+x.to);LinearLayout d=card();d.addView(tv(x.goods+"｜"+x.weight,20,deep,Typeface.BOLD));d.addView(tv("路线："+x.from+" → "+x.to,16,Color.rgb(65,76,94),0));d.addView(tv("车型："+x.vehicle,16,Color.rgb(65,76,94),0));d.addView(tv("装货："+x.time,16,Color.rgb(65,76,94),0));d.addView(tv("运费："+x.price,22,orange,Typeface.BOLD));d.addView(tv("联系人："+x.contact,16,Color.rgb(65,76,94),0));d.addView(tv("备注："+x.note,16,Color.rgb(65,76,94),0));Button take=btn("确认接单");take.setOnClickListener(v->{orders.add(new Order(x,"待装货"));Toast.makeText(this,"接单成功",Toast.LENGTH_LONG).show();showMe();});d.addView(take,new LinearLayout.LayoutParams(-1,dp(48)));}
          EditText input(String hint){EditText e=new EditText(this);e.setHint(hint);e.setTextSize(15);e.setSingleLine(true);e.setPadding(dp(14),0,dp(14),0);e.setBackground(stroke(Color.WHITE,14,1,Color.rgb(220,226,237)));LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(-1,dp(52));lp.setMargins(0,dp(6),0,dp(8));content.addView(e,lp);return e;}void showPublish(){clear("发布");header("发布车源","填写车辆与线路，获取合适货源");input("出发城市");input("目的城市");input("车型车长，例如 9.6 米厢式");input("可载重量，例如 10 吨");input("可装货时间，例如 今天 18:00");input("联系电话");Button b=btn("发布车源");b.setOnClickListener(v->{Toast.makeText(this,"车源已发布",Toast.LENGTH_LONG).show();showHome();});content.addView(b,new LinearLayout.LayoutParams(-1,dp(50)));}
          void showMe(){clear("我的");header("我的","司机中心");LinearLayout p=card();p.addView(tv("张师傅",22,deep,Typeface.BOLD));p.addView(tv("认证司机｜粤B·MVP88｜9.6 米厢式",15,muted,0));LinearLayout wallet=card();wallet.addView(tv("账户余额",14,muted,0));wallet.addView(tv("¥12,860",30,orange,Typeface.BOLD));content.addView(tv("我的订单",18,deep,Typeface.BOLD));if(orders.size()==0)content.addView(tv("暂无订单",15,muted,0));for(Order o:orders){LinearLayout box=card();box.addView(tv(o.status+"｜"+o.c.from+" → "+o.c.to,17,blue,Typeface.BOLD));box.addView(tv(o.c.goods+"｜"+o.c.weight+"｜"+o.c.price,15,Color.rgb(65,76,94),0));}}
          }
          EOF

      - name: Build debug APK
        working-directory: FreightMVP
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 步步云司机-debug-apk
          path: FreightMVP/app/build/outputs/apk/debug/*.apk
