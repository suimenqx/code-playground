name: Build Slice Rush Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'slice-rush-android/**'
      - '.github/workflows/build-slice-rush-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slice-rush-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SliceRush-debug-apk
          path: slice-rush-android/app/build/outputs/apk/debug/*.apk
