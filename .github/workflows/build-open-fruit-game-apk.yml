name: Build Open Source Fruit Game APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'scripts/build-open-fruit-game.sh'
      - '.github/workflows/build-open-fruit-game-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wrapper repo
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build upstream open source Android APK
        run: bash scripts/build-open-fruit-game.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSource-FruitGame-debug-apk
          path: dist-opensource-fruit-game/*
